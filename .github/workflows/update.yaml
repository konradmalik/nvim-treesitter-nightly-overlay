---
name: update treesitter grammars
on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
jobs:
  update:
    runs-on: ubuntu-26.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: DeterminateSystems/nix-installer-action@v22
      - run: nix flake update
      - run: nix develop --command "generate-parsers"
      - uses: peter-evans/create-pull-request@v8
        id: cpr
        with:
          token: ${{ secrets.PAT }}
          branch: ci/update
          commit-message: "chore: update flake inputs + generated.nix"
          title: "chore: update flake inputs + generated.nix"
          body: "This PR is auto-generated."
          assignees: konradmalik
      - if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --rebase "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.PAT }}
